  <audio id="theme" src="Also%20sprach%20Zarathustra.mp3" preload="auto"></audio>
  <script>
    async function startTheme() {
      const audio = document.getElementById('theme');
      try {
        if (audio.readyState < 1) {
          await new Promise((resolve) => {
            audio.addEventListener('loadedmetadata', resolve, { once: true });
            audio.load();
          });
        }
        audio.currentTime = 16;
        audio.volume = 0.15;
        audio.loop = true;
        await audio.play();
      } catch (error) {
        console.error('Theme playback failed:', error);
      }
    }

    document.addEventListener('pointerdown', startTheme, { once: true });
  </script>
